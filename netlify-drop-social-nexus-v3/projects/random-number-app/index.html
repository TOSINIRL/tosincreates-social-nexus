<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Premium Random Number Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-glow"></div>
    <div class="background-glow secondary"></div>

    <main class="app-container">
        <header class="app-header">
            <h1 class="app-title">Random Number<span>Generator</span></h1>
        </header>

        <section class="display-section">
            <div class="orbit-container">
                <div class="orbit-ring"></div>
                <div class="orbit-ring secondary"></div>
                <div class="main-orb">
                    <span id="result-number">42</span>
                </div>
            </div>
        </section>

        <section class="controls-section">
            <div class="range-inputs">
                <div class="input-group">
                    <label for="min-val">Min</label>
                    <input type="number" id="min-val" value="1" placeholder="1">
                </div>
                <div class="input-group">
                    <label for="max-val">Max</label>
                    <input type="number" id="max-val" value="100" placeholder="100">
                </div>
            </div>

            <button id="generate-btn" class="main-btn">
                <span>GENERATE</span>
                <div class="btn-glow"></div>
            </button>

            <div class="secondary-actions">
                <button class="glass-btn small" id="show-history">
                    <i data-lucide="history"></i>
                    <span>HISTORY</span>
                </button>
            </div>
        </section>

        <div id="history-modal" class="modal">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h3>Recent Numbers</h3>
                    <button class="close-modal"><i data-lucide="x"></i></button>
                </div>
                <div id="history-list" class="history-list">
                    <!-- History items will be injected here -->
                    <p class="empty-msg">No numbers generated yet.</p>
                </div>
                <button id="clear-history" class="text-btn">Clear History</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
